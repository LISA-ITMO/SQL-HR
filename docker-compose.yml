services:

  agent_server:
    build:
      context: ./agent_server
    image: jgsnapp/sql-hr-agent-server:latest
    container_name: agent_server
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${RESULTS_DIR:-./results}:/results
      - ${CROSS_ENCODER_CACHE_HOST_DIR:-./cross-encoder}:${CROSS_ENCODER_CACHE_DIR:-/models/cross-encoder}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
      
  frontend:
    build:
      context: ./frontend
    depends_on:
      agent_server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVER_URL: ${SERVER_URL:-http://agent_server}
      HOME: /app
      STREAMLIT_BROWSER_GATHERUSAGESTATS: "false"
      STREAMLIT_CONFIG_DIR: /app/.streamlit
    ports:
      - "8501:8501"

  postgres:
    build:
      context: .
      dockerfile: db/Dockerfile.postgres
    container_name: py-postgres
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./db/postgres:/var/lib/postgresql/data
      - ./data:/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/add_rows.sql:/docker-entrypoint-initdb.d/02-add_rows.sql:ro
      - ./db/header_spec.txt:/db/header_spec.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgadmin_data:
